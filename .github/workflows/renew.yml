name: Zampto Server Auto Renew

on:
#  schedule:
#    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    # 使用 Playwright 官方提供的 Docker 容器环境
    container:
      image: mcr.microsoft.com/playwright/python:v1.44.0-jammy

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Gost Proxy
      run: |
        # 👇👇👇 正在启动gost代理 👇👇👇                
        # 修复：改用容器自带的 curl -L -O 代替 wget
        curl -sSL -O https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
        gunzip -f gost-linux-amd64-2.11.5.gz
        chmod +x gost-linux-amd64-2.11.5
        
        echo "🔗 启动 Gost 隧道..."
        ./gost-linux-amd64-2.11.5 -L=http://:1080 -F="${{ secrets.SOCKS5_URL }}" > gost.log 2>&1 &
        
        sleep 5
        echo "--- 🌐 连通性测试 ---"
        curl -I -x http://127.0.0.1:1080 https://www.google.com

    - name: Run Renewal Script
      env:
        ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
        ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY: 127.0.0.1:1080
        HTTP_PROXY: http://127.0.0.1:1080
        HTTPS_PROXY: http://127.0.0.1:1080
      run: |
        python renew.py
