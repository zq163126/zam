name: Zampto Server Auto Renew

on:
#  schedule:
#    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest # 使用最新宿主机环境

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 💡 核心优化：直接安装较新版本的 playwright（例如 1.45.0+），完美原生兼容 Ubuntu 24.04 的新依赖链
        pip install playwright==1.45.1 requests

    - name: Install Playwright Browsers
      run: |
        # 升级后，此处的 --with-deps 会自动识别并精准安装 libasound2t64，不再报错
        playwright install chromium --with-deps

    - name: 启用 WARP 网络
      uses: fscarmen/warp-on-actions@v1.3
      with:
          stack: dual
          mode: client

    - name: 修复 DNS
      run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup dash.zampto.net 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

    - name: Run Renewal Script
      env:
        ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
        ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
        ZAMPTO_COOKIES: ${{ secrets.ZAMPTO_COOKIES }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY: 127.0.0.1:1080
        HTTP_PROXY: http://127.0.0.1:1080
        HTTPS_PROXY: http://127.0.0.1:1080
      run: |
        python renew.py
