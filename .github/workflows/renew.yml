name: Zampto Server Auto Renew

on:
#  schedule:
#    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    # 核心绝杀：强制指定使用传统的 Ubuntu 22.04 稳定版系统
    # 彻底避开新版 Ubuntu 24.04 的包名丢失 Bug，找回以前丝滑的运行体验
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 传统系统下，直接带上 --with-deps 一键安装浏览器和全量依赖，绝对不会报错
    - name: Install Playwright Browsers and Deps
      run: |
        playwright install chromium --with-deps

    - name: Setup Gost Proxy
      run: |
        # 👇👇👇 正在启动gost代理 👇👇👇                
        wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
        gunzip -f gost-linux-amd64-2.11.5.gz
        chmod +x gost-linux-amd64-2.11.5
        
        echo "🔗 启动 Gost 隧道..."
        ./gost-linux-amd64-2.11.5 -L=http://:1080 -F="${{ secrets.SOCKS5_URL }}" > gost.log 2>&1 &
        
        sleep 5
        echo "--- 🌐 连通性测试 ---"
        curl -I -x http://127.0.0.1:1080 https://www.google.com

    - name: Run Renewal Script
      env:
        ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
        ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY: 127.0.0.1:1080
        HTTP_PROXY: http://127.0.0.1:1080
        HTTPS_PROXY: http://127.0.0.1:1080
      run: |
        python renew.py
