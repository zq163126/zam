name: Zampto Server Auto Renew

on:
#  schedule:
#    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest # 💡 剥离 container 隔离，直接利用宿主机环境，完美兼容 WARP 与 sudo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 如果有 requirements.txt 则安装，否则单独安装基础库
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install playwright requests; fi

    - name: Install Playwright Browsers
      run: |
        # 💡 因为去掉了官方容器，我们需要在此处手动下载 chromium 浏览器及其系统依赖
        playwright install chromium --with-deps

    - name: 启用 WARP 网络
      uses: fscarmen/warp-on-actions@v1.3
      with:
          stack: dual
          mode: client

    - name: 修复 DNS
      run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup dash.zampto.net 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

    - name: Run Renewal Script
      env:
        ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
        ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
        ZAMPTO_COOKIES: ${{ secrets.ZAMPTO_COOKIES }} # 💡 顺便为你注入了上一步提到的 Cookie 变量支持
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY: 127.0.0.1:1080
        HTTP_PROXY: http://127.0.0.1:1080
        HTTPS_PROXY: http://127.0.0.1:1080
      run: |
        python renew.py
